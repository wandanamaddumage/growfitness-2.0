# Build and deploy NestJS API to Google Cloud Run on push to main.
# Required GitHub secrets: GCP_SA_KEY (JSON key of a service account with Cloud Build + Run permissions), GCP_PROJECT_ID.

name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared-types/**'
      - 'packages/shared-schemas/**'
      - 'apps/api/Dockerfile'
      - 'cloudbuild.yaml'
      - '.github/workflows/deploy-api-cloudrun.yml'

env:
  REGION: us-central1
  REPO: grow-api
  IMAGE: api
  SERVICE_NAME: grow-api

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
# Required GitHub secrets: GCP_SA_KEY (JSON key of a service account with Cloud Build + Run permissions), GCP_PROJECT_ID.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.auth.outputs.project_id }}

      - name: Build and push image
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions="_REGION=${{ env.REGION }},_REPO=${{ env.REPO }},_IMAGE=${{ env.IMAGE }},_TAG=${{ github.sha }}" \
            --project="${{ steps.auth.outputs.project_id }}" \
            .

      - name: Deploy to Cloud Run
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/${{ env.REPO }}/${{ env.IMAGE }}:latest"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="$IMAGE_URI" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --project="${{ steps.auth.outputs.project_id }}" \
            --set-env-vars="MONGODB_URI=${{ secrets.MONGODB_URI }},JWT_SECRET=${{ secrets.JWT_SECRET }},JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},TEXTLK_API_TOKEN=${{ secrets.TEXTLK_API_TOKEN }},TEXTLK_SENDER_ID=${{ secrets.TEXTLK_SENDER_ID }},CORS_ORIGIN=${{ secrets.CORS_ORIGIN }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --project=${{ steps.auth.outputs.project_id }} --format='value(status.url)')
          echo "API URL: $URL"
          echo "BASE_URL=$URL" >> $GITHUB_OUTPUT
